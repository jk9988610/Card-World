<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d1117" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>Card World</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/main.css?v=0.7.4" />
</head>
<body>
  <div id="app-version" class="app-version" aria-label="Version"></div>
  <header id="scene-bar" class="scene-bar hidden" aria-live="polite">
    <span id="scene-title" class="scene-title"></span>
  </header>
  <div class="zone zone-field" id="zone-field">
    <div class="zone-label" data-i18n="zone_field">Field</div>
    <div class="zone-cards" id="field-cards"></div>
  </div>
  <div class="zone zone-hand" id="zone-hand">
    <div class="zone-label" data-i18n="zone_hand">Hand</div>
    <div class="zone-cards" id="hand-cards"></div>
  </div>
  <div id="art-editor" class="art-editor hidden" aria-hidden="true">
    <div class="art-editor-shell">
      <header class="art-editor-top">
        <span id="art-editor-title" class="art-editor-title"></span>
        <button type="button" id="art-editor-close" class="art-editor-btn art-editor-btn-icon" aria-label="Close">×</button>
      </header>
      <div class="art-editor-toolbar" id="art-editor-tools" role="toolbar"></div>
      <div class="art-editor-canvas-wrap">
        <canvas id="art-pixel-canvas" width="32" height="32"></canvas>
      </div>
      <div class="art-editor-colors">
        <div id="art-palette" class="art-palette"></div>
        <div class="art-color-custom">
          <label class="art-color-label" id="art-color-label-rgb">RGB</label>
          <input type="color" id="art-color-picker" value="#e03131" />
          <input type="text" id="art-color-hex" class="art-color-hex" value="#e03131" maxlength="7" spellcheck="false" />
          <button type="button" id="art-color-apply" class="art-editor-btn art-editor-btn-small"></button>
        </div>
        <div id="art-brush-preview" class="art-brush-preview" title="Brush"></div>
      </div>
      <footer class="art-editor-foot">
        <p id="art-editor-hint" class="art-editor-hint"></p>
        <button type="button" id="art-export-btn" class="art-editor-btn art-editor-btn-primary"></button>
      </footer>
    </div>
  </div>
  <div id="card-zoom" class="card-zoom hidden" aria-hidden="true">
    <div class="card-zoom-backdrop" id="zoom-backdrop"></div>
    <div class="card-zoom-slot" id="zoom-slot"></div>
  </div>
  <script type="module" src="js/app.js?v=0.7.4"></script>
</body>
</html>
